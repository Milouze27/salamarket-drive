<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F4C3A" />
    <title>Hors ligne — Salamarket Drive</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Manrope", Roboto, "Helvetica Neue", Arial, sans-serif;
        background-color: #0F4C3A;
        color: #FFFFFF;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
        -webkit-font-smoothing: antialiased;
      }
      .logo-wrap {
        background: #FFFFFF;
        padding: 16px 24px;
        border-radius: 16px;
        margin-bottom: 32px;
        max-width: 280px;
      }
      .logo-wrap img {
        display: block;
        width: 100%;
        height: auto;
      }
      h1 {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 12px;
        letter-spacing: -0.01em;
      }
      p {
        font-size: 16px;
        opacity: 0.85;
        max-width: 320px;
        line-height: 1.5;
        margin-bottom: 32px;
      }
      button {
        background-color: #FFFFFF;
        color: #0F4C3A;
        border: none;
        padding: 14px 32px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 9999px;
        cursor: pointer;
        font-family: inherit;
        transition: opacity 0.15s ease;
      }
      button:active { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="logo-wrap">
      <img src="/brand/logo-horizontal.png" alt="Salamarket Drive"
           onerror="this.parentNode.style.display='none'" />
    </div>
    <h1>Connexion internet requise</h1>
    <p>Vérifiez votre connexion et rechargez la page.</p>
    <button type="button" onclick="window.location.reload()">Réessayer</button>
  </body>
</html>
