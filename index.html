<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F4C3A" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
      /* Bg sapin pour la transition splash natif iOS → mount React.
         Sans ça, il y a un flash blanc d'~1s : entre l'instant où le
         bundle Tailwind charge (qui applique `bg-bg` = #FAFAF7 sur
         html/body) et l'instant où React injecte enfin du contenu
         dans #root.

         Le sélecteur #root:empty est la clé : il garantit que tant que
         React n'a rien rendu, on voit du sapin. Dès que React mount,
         #root n'est plus :empty → la règle se désactive et l'app
         reprend la main avec son propre bg. */
      html, body {
        background-color: #0F4C3A;
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
      }
      #root:empty {
        position: fixed;
        inset: 0;
        background-color: #0F4C3A;
      }

      /* Splash HTML fallback — utilise le même design que les splash
         iOS natifs (sapin + arabesques dorées + logo centré). Plein
         écran cover. Garantit qu'on voit toujours un splash, même
         quand le cache iOS pour les apple-touch-startup-image est cassé. */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-color: #0F4C3A;
        background-image: url('/splash/iphone-1170x2532.png');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        transition: opacity 0.3s ease-out;
        animation: splash-fade-in 0.4s ease-out;
      }
      #app-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      @keyframes splash-fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
    </style>
    <meta name="apple-mobile-web-app-title" content="Salamarket" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- apple-touch-startup-image RETIRÉS volontairement.
         iOS gère mal le cache de ces images (versions buguées qui
         persistent même après update). Conflit visuel constaté entre
         le splash natif iOS bugué et le splash HTML inline.
         Solution : laisser iOS afficher juste le theme-color (sapin
         #0F4C3A) au boot, puis le splash HTML prend le relais
         immédiatement avec le bon design. Plus de conflit.
         PNG sources préservés dans /public/splash/ pour le splash HTML
         et un éventuel re-enable futur. -->

    <title>Salamarket Drive — Supermarché halal en click &amp; collect</title>
    <meta name="description" content="Salamarket Drive : votre supermarché halal en click &amp; collect à Toulouse. Commandez en ligne, retirez en magasin.">
    <meta name="author" content="Salamarket Drive" />

    <!-- Preload du splash HTML (priorité absolue, c'est le 1er truc affiché) -->
    <link rel="preload" as="image" href="/splash/iphone-1170x2532.png" fetchpriority="high" />
    <!-- Preload du LCP (1ère slide hero) — gain ~100-200ms sur le first paint -->
    <link rel="preload" as="image" href="/hero/slide-1-boucherie.webp" fetchpriority="high" />

    
    
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <meta property="og:title" content="Salamarket Drive — Supermarché halal en click &amp; collect">
  <meta name="twitter:title" content="Salamarket Drive — Supermarché halal en click &amp; collect">
  <meta property="og:description" content="Salamarket Drive : votre supermarché halal en click &amp; collect à Toulouse. Commandez en ligne, retirez en magasin.">
  <meta name="twitter:description" content="Salamarket Drive : votre supermarché halal en click &amp; collect à Toulouse. Commandez en ligne, retirez en magasin.">
  <meta property="og:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/70b960b0-eec7-4a4f-9bec-bc389d2a8fdc/id-preview-c72a26dd--e2df2797-1f5f-4892-8b36-9dab8982acdd.lovable.app-1777414112297.png">

</head>

  <body>
    <div id="app-splash" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide splash dès que React a injecté du contenu dans #root.
      // Backup : timeout 5s pour pas bloquer si React fail.
      (function () {
        var splash = document.getElementById('app-splash');
        if (!splash) return;
        var hide = function () {
          splash.classList.add('hidden');
          setTimeout(function () { splash.remove(); }, 300);
        };
        var checkReact = function () {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            hide();
          } else {
            requestAnimationFrame(checkReact);
          }
        };
        // Min 600ms pour laisser le splash s'afficher (sinon flash trop rapide)
        setTimeout(checkReact, 600);
        // Safety net 5s si React ne mount jamais
        setTimeout(hide, 5000);
      })();
    </script>
  </body>
</html>
