    <style>
      /* Bg sapin pour la transition splash natif iOS → mount React.
         Sans ça, il y a un flash blanc d'~1s : entre l'instant où le
         bundle Tailwind charge (qui applique `bg-bg` = #FAFAF7 sur
         html/body) et l'instant où React injecte enfin du contenu
         dans #root.

         Le sélecteur #root:empty est la clé : il garantit que tant que
         React n'a rien rendu, on voit du sapin. Dès que React mount,
         #root n'est plus :empty → la règle se désactive et l'app
         reprend la main avec son propre bg. */
      html, body {
        background-color: #0F4C3A;
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
      }
      #root:empty {
        position: fixed;
        inset: 0;
        background-color: #0F4C3A;
      }

      /* Splash HTML fallback — utilise le même design que les splash
         iOS natifs (sapin + arabesques dorées + logo centré). Plein
         écran cover. Garantit qu'on voit toujours un splash, même
         quand le cache iOS pour les apple-touch-startup-image est cassé.

         Transition 600ms + scale pour un fade-out perceptible (avant
         300ms = trop court pour être perçu, donnait l'impression d'une
         disparition brutale). Le JS utilise transitionend pour timing
         exact + safety fallback 800ms. */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-color: #0F4C3A;
        background-image: url('/splash/iphone-1170x2532.png');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 1;
        transform: scale(1);
        transform-origin: center;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        animation: splash-fade-in 0.4s ease-out;
        will-change: opacity, transform;
      }
      #app-splash.hidden {
        opacity: 0;
        transform: scale(1.08);
        pointer-events: none;
      }
      @keyframes splash-fade-in {
        from { opacity: 0; transform: scale(0.98); }
        to { opacity: 1; transform: scale(1); }
      }
    </style>
    <meta name="apple-mobile-web-app-title" content="Salamarket" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- apple-touch-startup-image RETIRÉS volontairement.
         iOS gère mal le cache de ces images (versions buguées qui
         persistent même après update). Conflit visuel constaté entre
         le splash natif iOS bugué et le splash HTML inline.
         Solution : laisser iOS afficher juste le theme-color (sapin
         #0F4C3A) au boot, puis le splash HTML prend le relais
         immédiatement avec le bon design. Plus de conflit.
         PNG sources préservés dans /public/splash/ pour le splash HTML
         et un éventuel re-enable futur. -->

    <link rel="preload" as="image" href="/hero/slide-1-boucherie.webp" fetchpriority="high" />

  <body>
    <div id="app-splash" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide splash dès que React a injecté du contenu dans #root.
      // Utilise transitionend pour garantir que la transition CSS est
      // complètement terminée avant de remove() le DOM (sinon le browser
      // peut prioriser remove() et le user voit une disparition brutale).
      // Safety : timeout 800ms (>600ms transition) + 5s pour React fail.
      (function () {
        var splash = document.getElementById('app-splash');
        if (!splash) return;
        var hidden = false;
        var removed = false;

        var doRemove = function () {
          if (removed) return;
          removed = true;
          if (splash.parentNode) splash.parentNode.removeChild(splash);
        };

        var hide = function () {
          if (hidden) return;
          hidden = true;
          splash.classList.add('hidden');
          // 1. Use transitionend (precise, fires when CSS transition done)
          splash.addEventListener('transitionend', doRemove, { once: true });
          // 2. Fallback safety net (transition is 600ms, give 200ms buffer)
          setTimeout(doRemove, 800);
        };

        var checkReact = function () {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            hide();
          } else {
            requestAnimationFrame(checkReact);
          }
        };

        // Min 800ms avant de hide pour que le splash soit clairement
        // perceptible (avant 600ms = trop rapide selon retour user).
        setTimeout(checkReact, 800);
        // Safety net 5s si React ne mount jamais
        setTimeout(hide, 5000);
      })();
    </script>
  </body>
